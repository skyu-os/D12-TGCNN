# =============================================================
# T-GCN 全站点训练配置（2587 站点，RTX 4090 48G 强化版）
# 用途: 使用 all_stations 全量站点进行训练，尽量吃满 48G 显存
# 说明: 若遇到 OOM，可先把 batch_size 从 192 降到 160/128
# =============================================================

# -------------------- 数据准备参数 --------------------
prepare:
  station_list: "../data/d12_data/all_stations.txt"  # 全部站点列表
  top_n: 2587                # 全站点数量（请按数据实际数量调整）
  days: 59                   # 训练数据天数（1-2 月）
  val_days: 11               # 验证数据天数（3 月）
  threshold: 3.0             # 邻接矩阵距离阈值（km）
  start_date: "2026_01_01"   # 训练数据起始日期

# -------------------- 训练参数 --------------------
train:
  model: TGCN                # 模型类型: TGCN
  hidden_dim: 128            # 增大模型容量
  seq_len: 12                # 输入序列长度（1小时历史数据）
  pre_len: 3                 # 预测步长（未来15分钟）
  epochs: 120                # 全量训练轮数
  batch_size: 192            # 48G 显存高吞吐档位
  lr: 0.0018                 # 与较大 batch 匹配的学习率
  weight_decay: 0.0015       # L2 正则化系数
  use_regularization: false  # 关闭额外正则损失以提升速度
  num_workers: 16            # 多进程数据加载
  prefetch_factor: 8         # 每个 worker 预取批次数
  amp: true                  # 混合精度训练
  save_dir: saved_models/allstations_48g
  results_dir: results/allstations_48g
