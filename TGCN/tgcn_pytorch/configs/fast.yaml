# =============================================================
# T-GCN 快速训练配置
# 用途: 快速验证流程、调试代码
# 预计 GPU 时间: ~10 分钟
# =============================================================

# -------------------- 数据准备参数 --------------------
prepare:
  top_n: 100                 # 选取传感器数量（按重要性排序前100）
  days: 7                    # 训练数据天数（7天 × 288步/天 = 2016个时间步）
  val_days: 3                # 验证数据天数（3天 × 288步/天 = 864个时间步）
  threshold: 3.0             # 邻接矩阵距离阈值（km），3km 内的传感器视为相连
  start_date: "2026_01_01"   # 训练数据起始日期

# -------------------- 训练参数 --------------------
train:
  model: TGCN                # 模型类型: TGCN / GRU / GCN
  hidden_dim: 32             # 隐藏层维度，快速测试用较小值
  seq_len: 12                # 输入序列长度（12步 × 5分钟 = 1小时历史数据）
  pre_len: 3                 # 预测步长（3步 × 5分钟 = 预测未来15分钟）
  epochs: 50                 # 训练轮数，快速测试不需要太多
  batch_size: 64             # 批大小，小模型可用较大 batch
  lr: 0.001                  # 初始学习率
  weight_decay: 0.0015       # L2 正则化系数
  use_regularization: false  # 是否使用额外正则化损失
  save_dir: saved_models     # 模型保存目录
  results_dir: results       # 结果保存目录
