# =============================================================
# T-GCN 全传感器训练配置
# 用途: 使用全部传感器进行训练
# 使用前需先准备数据:
#   python TGCN/prepare_all_sensors_data.py
# =============================================================

# -------------------- 数据准备参数 --------------------
prepare:
  all_sensors: true
  top_n: 0                  # 0 = 使用全部传感器
  days: 59                  # 训练数据天数（1-2 月）
  val_days: 11              # 验证数据天数（3 月）
  threshold: 3.0            # 邻接矩阵距离阈值（km）
  start_date: "2026_01_01"

# -------------------- 训练参数 --------------------
train:
  model: TGCN
  hidden_dim: 64            # 兼顾 CPU 推理速度
  seq_len: 12               # 输入序列长度（1小时历史数据）
  pre_len: 3                # 预测步长（未来15分钟）
  epochs: 100
  batch_size: 256           # 根据显存调整
  lr: 0.002
  weight_decay: 0.0015
  use_regularization: false
  num_workers: 8
  prefetch_factor: 4
  amp: true
  speed_path: data/all_sensors/d12_speed.csv
  adj_path: data/all_sensors/d12_adj.csv
  save_dir: save-model/all_sensors
  results_dir: results/all_sensors
