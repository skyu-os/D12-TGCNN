# =============================================================
# T-GCN 推荐训练配置 ★
# 用途: 兼顾训练速度和预测精度的推荐方案
# 预计 GPU 时间: ~30-60 分钟
# =============================================================

# -------------------- 数据准备参数 --------------------
prepare:
  top_n: 200                 # 选取传感器数量（前200个，覆盖主要干道）
  days: 14                   # 训练数据天数（14天，包含两周交通模式）
  val_days: 7                # 验证数据天数（7天，完整一周验证）
  threshold: 3.0             # 邻接矩阵距离阈值（km）
  start_date: "2026_01_01"   # 训练数据起始日期

# -------------------- 训练参数 --------------------
train:
  model: TGCN                # 模型类型: TGCN（GCN捕获空间 + GRU捕获时间）
  hidden_dim: 64             # 隐藏层维度，64 是 T-GCN 论文默认值
  seq_len: 12                # 输入序列长度（1小时历史数据）
  pre_len: 3                 # 预测步长（预测未来15分钟）
  epochs: 100                # 训练轮数，通常 80-120 轮收敛
  batch_size: 32             # 批大小
  lr: 0.001                  # 初始学习率
  weight_decay: 0.0015       # L2 正则化系数（T-GCN 论文推荐 1.5e-3）
  use_regularization: true   # 启用 MSE + L2 正则化组合损失
  save_dir: saved_models     # 模型保存目录
  results_dir: results       # 结果保存目录
