# =============================================================
# T-GCN 标准训练配置
# 用途: 较完整数据训练，适合论文实验和正式部署
# 预计 GPU 时间: ~2-3 小时
# =============================================================

# -------------------- 数据准备参数 --------------------
prepare:
  top_n: 300                 # 选取传感器数量（前300个，覆盖绝大多数主干道和匝道）
  days: 30                   # 训练数据天数（30天，包含完整月度交通模式）
  val_days: 7                # 验证数据天数（7天）
  threshold: 3.0             # 邻接矩阵距离阈值（km）
  start_date: "2026_01_01"   # 训练数据起始日期

# -------------------- 训练参数 --------------------
train:
  model: TGCN                # 模型类型: TGCN
  hidden_dim: 64             # 隐藏层维度
  seq_len: 12                # 输入序列长度（1小时历史数据）
  pre_len: 3                 # 预测步长（预测未来15分钟）
  epochs: 150                # 训练轮数，数据量大需要更多轮
  batch_size: 32             # 批大小
  lr: 0.001                  # 初始学习率
  weight_decay: 0.0015       # L2 正则化系数
  use_regularization: true   # 启用正则化损失
  save_dir: saved_models     # 模型保存目录
  results_dir: results       # 结果保存目录
