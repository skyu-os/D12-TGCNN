# =============================================================
# T-GCN 全量训练配置（4090-48G 加速版）
# 用途: 使用全部 top500 传感器和完整数据，同时提升吞吐速度
# 预计 GPU 时间: ~1.5-3 小时（视负载波动）
# =============================================================

# -------------------- 数据准备参数 --------------------
prepare:
  top_n: 500                 # 选取传感器数量（全部 top500，完整路网覆盖）
  days: 59                   # 训练数据天数（全部 1-2 月数据）
  val_days: 11               # 验证数据天数（全部 3 月数据）
  threshold: 3.0             # 邻接矩阵距离阈值（km）
  start_date: "2026_01_01"   # 训练数据起始日期

# -------------------- 训练参数 --------------------
train:
  model: TGCN                # 模型类型: TGCN
  hidden_dim: 64             # 降低计算量，提高单步吞吐
  seq_len: 12                # 输入序列长度（1小时历史数据）
  pre_len: 3                 # 预测步长（预测未来15分钟）
  epochs: 100                # 减少总训练轮次，加快整体完成速度
  batch_size: 512            # 利用 48G 显存提升并行吞吐
  lr: 0.002                  # 大 batch 对应略高学习率
  weight_decay: 0.0015       # L2 正则化系数
  use_regularization: false  # 关闭额外正则损失，减少计算开销
  num_workers: 12            # 多进程数据加载
  prefetch_factor: 6         # 提高 DataLoader 预取
  amp: true                  # 启用混合精度训练
  save_dir: saved_models     # 模型保存目录
  results_dir: results       # 结果保存目录
