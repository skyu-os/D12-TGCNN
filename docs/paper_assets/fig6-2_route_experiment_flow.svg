<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <style>.title{font:700 30px "Microsoft YaHei",Arial,sans-serif;fill:#172033}.h{font:700 18px "Microsoft YaHei",Arial,sans-serif;fill:#172033}.t{font:15px "Microsoft YaHei",Arial,sans-serif;fill:#344054}.box{rx:12;ry:12;stroke-width:2;fill:#fff}.blue{stroke:#2563eb;fill:#eff6ff}.green{stroke:#16a34a;fill:#f0fdf4}.orange{stroke:#dd6b20;fill:#fff7ed}.red{stroke:#dc2626;fill:#fef2f2}.purple{stroke:#7c3aed;fill:#faf5ff}.arrow{stroke:#263445;stroke-width:2.3;fill:none;marker-end:url(#m)}</style>
    <marker id="m" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto"><path d="M0,0 L12,4 L0,8 Z" fill="#263445"/></marker>
  </defs>
  <rect width="1280" height="720" fill="#fff"/><text x="640" y="52" text-anchor="middle" class="title">图6-2 路径规划实验对比流程图</text>
  <rect x="500" y="95" width="280" height="70" class="box purple"/><text x="640" y="125" text-anchor="middle" class="h">统一 OD 场景</text><text x="640" y="150" text-anchor="middle" class="t">同一起点、终点与路网条件</text>
  <rect x="70" y="245" width="200" height="155" class="box blue"/><text x="170" y="280" text-anchor="middle" class="h">Dijkstra</text><text x="170" y="314" text-anchor="middle" class="t">18.22 km</text><text x="170" y="338" text-anchor="middle" class="t">11.3 min</text><text x="170" y="362" text-anchor="middle" class="t">2504.2 ms</text>
  <rect x="305" y="245" width="200" height="155" class="box green"/><text x="405" y="280" text-anchor="middle" class="h">A*</text><text x="405" y="314" text-anchor="middle" class="t">19.07 km</text><text x="405" y="338" text-anchor="middle" class="t">16.4 min</text><text x="405" y="362" text-anchor="middle" class="t">2341.7 ms</text>
  <rect x="540" y="245" width="200" height="155" class="box orange"/><text x="640" y="280" text-anchor="middle" class="h">ALT</text><text x="640" y="314" text-anchor="middle" class="t">21.73 km</text><text x="640" y="338" text-anchor="middle" class="t">14.2 min</text><text x="640" y="362" text-anchor="middle" class="t">1803.0 ms</text>
  <rect x="775" y="245" width="200" height="155" class="box orange"/><text x="875" y="280" text-anchor="middle" class="h">预测驱动重规划</text><text x="875" y="314" text-anchor="middle" class="t">19.07 km，19.0 min</text><text x="875" y="338" text-anchor="middle" class="t">增加 153.2 s</text><text x="875" y="362" text-anchor="middle" class="t">增加比例 15.52%</text>
  <rect x="1010" y="245" width="200" height="155" class="box red"/><text x="1110" y="280" text-anchor="middle" class="h">时变 A*</text><text x="1110" y="314" text-anchor="middle" class="t">18.43 km，37.8 min</text><text x="1110" y="338" text-anchor="middle" class="t">平均 29.29 km/h</text><text x="1110" y="362" text-anchor="middle" class="t">延迟 1080.2 s</text>
  <rect x="360" y="520" width="560" height="85" class="box purple"/><text x="640" y="554" text-anchor="middle" class="h">综合比较与分析</text><text x="640" y="584" text-anchor="middle" class="t">比较路径距离、预计时间、计算耗时，并分析预测接入后的时间修正能力</text>
  <path d="M640 165 L170 245" class="arrow"/><path d="M640 165 L405 245" class="arrow"/><path d="M640 165 L640 245" class="arrow"/><path d="M640 165 L875 245" class="arrow"/><path d="M640 165 L1110 245" class="arrow"/>
  <path d="M170 400 L460 520" class="arrow"/><path d="M405 400 L545 520" class="arrow"/><path d="M640 400 L640 520" class="arrow"/><path d="M875 400 L735 520" class="arrow"/><path d="M1110 400 L820 520" class="arrow"/>
</svg>
