   <g id="text_1">
    <text style="font: 700 15px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif; text-anchor: start" x="36.6624" y="38.982705" transform="rotate(-0 36.6624 38.982705)">技术路线图</text>
   </g>
   <g id="text_2">
    <text style="font: 8.5px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif; text-anchor: start" x="36.6624" y="52.447871" transform="rotate(-0 36.6624 52.447871)">基于实时交通状态预测的智能路径规划系统设计与实现</text>
   </g>
   <g id="text_3">
    <text style="font: 700 10.2px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif; text-anchor: middle" x="191.34" y="99.491805" transform="rotate(-0 191.34 99.491805)">1  原始数据输入</text>
   </g>
   <g id="text_4">
    <text style="font: 7px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif" transform="translate(151.768125 110.862015)">PeMS detector 速度数据</text>
    <text style="font: 7px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif" transform="translate(161.011953 119.428834)">OSM 道路网络数据</text>
   </g>
   <g id="text_5">
    <text style="font: 700 10.2px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif; text-anchor: middle" x="191.34" y="167.350365" transform="rotate(-0 191.34 167.350365)">2  数据清洗与图建模</text>
   </g>
   <g id="text_6">
    <text style="font: 7px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif" transform="translate(130.804219 178.720575)">缺失值处理、传感器筛选 构建速度序列</text>
    <text style="font: 7px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif" transform="translate(167.048359 187.287394)">X 与邻接矩阵 A</text>
   </g>
   <g id="text_7">
    <text style="font: 700 10.2px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif; text-anchor: middle" x="191.34" y="235.208925" transform="rotate(-0 191.34 235.208925)">3  T-GCN 短时交通预测</text>
   </g>
   <g id="text_8">
    <text style="font: 7px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif" transform="translate(136.268047 246.579135)">利用图卷积提取空间依赖 利用 GRU</text>
    <text style="font: 7px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif" transform="translate(170.34 255.145954)">捕获时间变化</text>
   </g>
   <g id="text_9">
    <text style="font: 700 10.2px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif; text-anchor: middle" x="191.34" y="303.067485" transform="rotate(-0 191.34 303.067485)">4  预测速度空间扩展</text>
   </g>
   <g id="text_10">
    <text style="font: 7px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif" transform="translate(148.047734 314.437695)">方差恢复修正速度波动 IDW</text>
    <text style="font: 7px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif" transform="translate(158.730938 323.004514)">映射至全部 detector</text>
   </g>
   <g id="text_11">
    <text style="font: 700 10.2px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif; text-anchor: middle" x="191.34" y="370.926045" transform="rotate(-0 191.34 370.926045)">5  动态边权计算</text>
   </g>
   <g id="text_12">
    <text style="font: 7px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif" transform="translate(152.84 382.296255)">将节点速度映射到道路边</text>
