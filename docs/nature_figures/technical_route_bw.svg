   </g>
   <g id="text_13">
    <text style="font: 700 10.2px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif; text-anchor: middle" x="191.34" y="438.784605" transform="rotate(-0 191.34 438.784605)">6  路径规划与实验验证</text>
   </g>
   <g id="text_14">
    <text style="font: 7px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif" transform="translate(139.629688 450.154815)">静态 A*、预测驱动规划、时变 A*</text>
    <text style="font: 7px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif" transform="translate(142.34 458.721634)">对比路径长度、时间和计算耗时</text>
   </g>
   <g id="text_15">
    <text style="font: 7.8px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif" transform="translate(46.176047 153.993216) rotate(-90)">数据基础</text>
   </g>
   <g id="text_16">
    <text style="font: 7.8px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif" transform="translate(46.176047 289.710336) rotate(-90)">预测建模</text>
   </g>
   <g id="text_17">
    <text style="font: 7.8px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif" transform="translate(46.176047 425.427456) rotate(-90)">路径决策</text>
   </g>
   <g id="text_18">
    <text style="font: 7.5px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif; text-anchor: middle" x="191.34" y="513.680726" transform="rotate(-0 191.34 513.680726)">主流程：真实数据 → 图结构输入 → 交通状态预测 → 动态通行代价 → 路径规划验证</text>
   </g>
   <g id="text_19">
    <text style="font: 7.2px 'Microsoft YaHei', 'SimHei', 'SimSun', 'Arial', sans-serif; text-anchor: middle" x="191.34" y="554.878732" transform="rotate(-0 191.34 554.878732)">注：全图采用黑白线稿和直线箭头，适合论文正文黑白打印。</text>
